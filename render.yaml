# ==============================================================================
# PathForge - Render Blueprint Specification
# Use this on Render (New -> Blueprint) to automatically provision the database
# and web service together.
# ==============================================================================

services:
  - type: web
    name: pathforge
    env: python
    buildCommand: pip install -r backend/requirements.txt
    startCommand: gunicorn --chdir backend -k uvicorn.workers.UvicornWorker main:app --bind 0.0.0.0:$PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: pathforge-db
          property: connectionString
      - key: GROQ_API_KEY
        sync: false # Render will prompt you for this value during creation
      - key: SECRET_KEY
        generateValue: true # Render will automatically generate a secure key

databases:
  - name: pathforge-db
    plan: free # Uses Render's free PostgreSQL tier (expires after 90 days)
